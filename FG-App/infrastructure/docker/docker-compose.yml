version: '3.8'

services:
  # ── API Gateway ─────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE: api-gateway
    ports: ["3000:3000"]
    environment:
      - NODE_ENV=development
      - JWT_SECRET=${JWT_SECRET:-fg_jwt_secret_dev}
    depends_on: [auth-service, order-service, delivery-service, payment-service, notification-service, realtime-service, search-service, analytics-service]
    restart: unless-stopped

  # ── Microservices ──────────────────────────────────────────────────────
  auth-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE: auth-service
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - JWT_SECRET=${JWT_SECRET:-fg_jwt_secret_dev}
    restart: unless-stopped

  restaurant-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE: restaurant-service
    ports:
      - "3002:3002"
    restart: unless-stopped

  order-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE: order-service
    ports:
      - "3003:3003"
    depends_on: [kafka, postgres]
    environment:
      - DATABASE_URL=postgresql://fg_user:fg_pass@postgres:5432/fg_db
      - KAFKA_BROKERS=kafka:9092
    restart: unless-stopped

  delivery-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE: delivery-service
    ports:
      - "3004:3004"
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379
    restart: unless-stopped

  payment-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE: payment-service
    ports:
      - "3005:3005"
    environment:
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
    restart: unless-stopped

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE: notification-service
    ports:
      - "3006:3006"
    environment:
      - FCM_SERVER_KEY=${FCM_SERVER_KEY}
    restart: unless-stopped

  realtime-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE: realtime-service
    ports:
      - "3007:3007"
    depends_on:
      - redis
      - kafka
    environment:
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:9092
    restart: unless-stopped

  search-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE: search-service
    ports:
      - "3008:3008"
    restart: unless-stopped

  analytics-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE: analytics-service
    ports:
      - "3009:3009"
    depends_on: [postgres, kafka]
    environment:
      - DATABASE_URL=postgresql://fg_user:fg_pass@postgres:5432/fg_db
      - KAFKA_BROKERS=kafka:9092
    restart: unless-stopped

  # ── Web Admin Dashboard ────────────────────────────────────────────────
  web-admin:
    build:
      context: ../apps/web-admin
      dockerfile: Dockerfile
    ports: ["4000:4000"]
    environment: [NEXT_PUBLIC_API_URL=http://api-gateway:3000, NEXT_PUBLIC_WS_URL=ws://realtime-service:3007]
    depends_on: [api-gateway, realtime-service]
    restart: unless-stopped

  # ── Infrastructure ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes: [redis_data:/data]
    restart: unless-stopped

  postgres:
    image: postgis/postgis:15-3.3
    ports: ["5433:5432"]
    environment:
      - POSTGRES_DB=fg_db
      - POSTGRES_USER=fg_user
      - POSTGRES_PASSWORD=fg_pass
    volumes: [postgres_data:/var/lib/postgresql/data, ./init.sql:/docker-entrypoint-initdb.d/init.sql]
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment: { ZOOKEEPER_CLIENT_PORT: 2181, ZOOKEEPER_TICK_TIME: 2000 }
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    ports: ["9092:9092"]
    depends_on: [zookeeper]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    restart: unless-stopped

  # ── Monitoring ─────────────────────────────────────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    ports: ["8081:8081"]
    environment: [REDIS_HOSTS=local:redis:6379]
    depends_on: [redis]

volumes:
  redis_data:
  postgres_data:
