name: F&G CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/fg

jobs:
  # ── Lint & Test ─────────────────────────────────────────────────────────
  test:
    name: Test All Services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-gateway, auth-service, order-service, delivery-service, payment-service, notification-service, realtime-service, search-service, analytics-service, restaurant-service]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '18', cache: 'npm' }
      - run: npm ci --legacy-peer-deps
      - run: npm test --workspace=services/${{ matrix.service }} --if-present
        env:
          NODE_ENV: test
          JWT_SECRET: test_secret
          USE_MOCK_REDIS: 'true'
          USE_MOCK_KAFKA: 'true'

  # ── Build Docker Images ─────────────────────────────────────────────────
  build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service: [api-gateway, auth-service, order-service, delivery-service, payment-service, notification-service, realtime-service, search-service, analytics-service, restaurant-service]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/Dockerfile.service
          build-args: SERVICE=${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to Kubernetes ────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v3
      - name: Configure kubectl
        run: echo "${{ secrets.KUBECONFIG }}" | base64 -d > /tmp/kubeconfig
        env: { KUBECONFIG: /tmp/kubeconfig }

      - name: Update image tags
        run: |
          for service in api-gateway auth-service order-service delivery-service payment-service notification-service realtime-service search-service analytics-service restaurant-service; do
            kubectl set image deployment/$service $service=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-$service:${{ github.sha }} -n fg-prod
          done
        env: { KUBECONFIG: /tmp/kubeconfig }

      - name: Wait for rollout
        run: kubectl rollout status deployment/order-service -n fg-prod --timeout=120s
        env: { KUBECONFIG: /tmp/kubeconfig }

  # ── Expo Mobile Build (EAS) ─────────────────────────────────────────────
  mobile-build:
    name: Build Mobile App (EAS)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '18' }
      - run: npm install -g eas-cli
      - run: npm ci --workspace=apps/mobile --legacy-peer-deps
      - name: Build Android APK
        run: eas build --platform android --profile preview --non-interactive
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
