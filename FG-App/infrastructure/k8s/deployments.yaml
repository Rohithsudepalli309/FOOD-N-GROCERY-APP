apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: fg-prod
  labels: { app: order-service, tier: backend }
spec:
  replicas: 3
  selector: { matchLabels: { app: order-service } }
  template:
    metadata: { labels: { app: order-service } }
    spec:
      containers:
        - name: order-service
          image: ghcr.io/youorg/fg-order-service:latest
          ports: [{ containerPort: 3003 }]
          env:
            - { name: NODE_ENV, value: production }
            - { name: PORT, value: "3003" }
            - name: DATABASE_URL
              valueFrom: { secretKeyRef: { name: fg-secrets, key: DATABASE_URL } }
            - name: KAFKA_BROKERS
              valueFrom: { configMapKeyRef: { name: fg-config, key: KAFKA_BROKERS } }
          resources:
            requests: { memory: "128Mi", cpu: "100m" }
            limits:   { memory: "512Mi", cpu: "500m" }
          readinessProbe:
            httpGet: { path: /api/orders/health, port: 3003 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /api/orders/health, port: 3003 }
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: fg-prod
spec:
  selector: { app: order-service }
  ports: [{ port: 3003, targetPort: 3003 }]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: order-service-hpa
  namespace: fg-prod
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: order-service }
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
    - type: Resource
      resource: { name: memory, target: { type: Utilization, averageUtilization: 80 } }
---
# Realtime service needs sticky sessions for Socket.IO
apiVersion: apps/v1
kind: Deployment
metadata:
  name: realtime-service
  namespace: fg-prod
spec:
  replicas: 2
  selector: { matchLabels: { app: realtime-service } }
  template:
    metadata: { labels: { app: realtime-service } }
    spec:
      containers:
        - name: realtime-service
          image: ghcr.io/youorg/fg-realtime-service:latest
          ports: [{ containerPort: 3007 }]
          env:
            - { name: NODE_ENV, value: production }
            - name: REDIS_URL
              valueFrom: { secretKeyRef: { name: fg-secrets, key: REDIS_URL } }
          resources:
            requests: { memory: "256Mi", cpu: "200m" }
            limits:   { memory: "1Gi", cpu: "1000m" }
---
apiVersion: v1
kind: Service
metadata:
  name: realtime-service
  namespace: fg-prod
  annotations:
    # Sticky sessions required for Socket.IO (Cookie-based affinity)
    service.beta.kubernetes.io/aws-load-balancer-stickiness-enabled: "true"
spec:
  selector: { app: realtime-service }
  ports: [{ port: 3007, targetPort: 3007 }]
  sessionAffinity: ClientIP
