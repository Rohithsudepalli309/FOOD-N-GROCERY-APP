<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>F&G Restaurant Dashboard</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --brand: #FF5722; --green: #22c55e; --red: #ef4444; --yellow: #f59e0b;
      --purple: #a855f7; --dark: #0F0F0F; --card: #1a1a1a; --border: #2a2a2a;
      --text: #f0f0f0; --muted: #888; --dim: #555;
    }
    body { font-family: 'Inter', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; }
    header {
      background: linear-gradient(135deg, #1a0500, #0F0F0F);
      padding: 16px 24px; display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-badge {
      width: 44px; height: 44px; background: linear-gradient(135deg, var(--brand), #c0392b);
      border-radius: 12px; display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 16px; color: white;
    }
    .logo-title { font-size: 20px; font-weight: 900; }
    .logo-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .status-badge {
      display: flex; align-items: center; gap: 6px; padding: 6px 14px;
      background: #16160e; border: 1px solid var(--border); border-radius: 999px;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .status-text { font-size: 12px; font-weight: 700; color: var(--green); }
    .main { padding: 24px; max-width: 1200px; margin: 0 auto; }
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    .stat-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 16px;
      padding: 20px; text-align: center;
    }
    .stat-emoji { font-size: 28px; margin-bottom: 8px; }
    .stat-val { font-size: 28px; font-weight: 900; color: var(--brand); }
    .stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .orders-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .panel { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; }
    .panel-title { font-size: 16px; font-weight: 800; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .new-badge {
      background: var(--brand); color: #fff; font-size: 9px; font-weight: 900;
      padding: 2px 8px; border-radius: 999px;
    }
    .order-card {
      background: #111; border: 1px solid var(--border); border-radius: 12px; padding: 16px;
      margin-bottom: 12px; transition: border-color 0.3s;
    }
    .order-card.new { border-color: var(--brand); animation: glow 2s infinite; }
    @keyframes glow { 0%,100%{box-shadow:0 0 0 transparent} 50%{box-shadow:0 0 20px #ff572244} }
    .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .order-id { font-weight: 800; font-size: 14px; color: var(--brand); }
    .order-time { font-size: 11px; color: var(--muted); }
    .order-items { font-size: 13px; color: var(--muted); margin-bottom: 12px; line-height: 1.5; }
    .order-footer { display: flex; align-items: center; justify-content: space-between; }
    .order-total { font-size: 18px; font-weight: 900; }
    .btn-row { display: flex; gap: 8px; }
    .btn {
      padding: 8px 16px; border-radius: 8px; border: none; font-weight: 700;
      font-size: 12px; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.2s;
    }
    .btn-accept { background: var(--green); color: #fff; }
    .btn-reject { background: transparent; color: var(--red); border: 1px solid var(--red); }
    .btn:hover { transform: translateY(-1px); opacity: 0.9; }
    .timer-bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 10px; overflow: hidden; }
    .timer-fill { height: 100%; background: var(--brand); border-radius: 2px; transition: width 1s linear; }
    .status-chip {
      display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px;
      border-radius: 999px; font-size: 11px; font-weight: 700;
    }
    .chip-preparing { background: #f59e0b22; color: var(--yellow); }
    .chip-delivered { background: #22c55e22; color: var(--green); }
    .log-entry { padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
    .log-time { color: var(--muted); font-size: 10px; }
    .log-msg { color: var(--text); margin-top: 2px; }
    .no-orders { text-align: center; color: var(--muted); padding: 40px; font-size: 14px; }
    .connection-bar {
      background: #1a1a1a; border-bottom: 1px solid var(--border); padding: 8px 24px;
      display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted);
    }
    @media (max-width: 768px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .orders-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <div class="logo-badge">F&G</div>
      <div>
        <div class="logo-title">Restaurant Dashboard</div>
        <div class="logo-sub">Real-Time Order Management</div>
      </div>
    </div>
    <div class="status-badge">
      <div class="dot" id="socket-dot"></div>
      <span class="status-text" id="socket-status">Connecting...</span>
    </div>
  </header>

  <div class="connection-bar">
    <span>🔗 Socket.IO Server:</span>
    <input id="server-url" value="http://localhost:3001" style="background:#111;border:1px solid #333;color:#fff;padding:3px 8px;border-radius:6px;font-size:12px;width:220px;" />
    <button onclick="reconnect()" class="btn btn-accept" style="padding:4px 12px;">Connect</button>
    <span id="conn-info" style="margin-left:auto">Orders today: <strong id="orders-today">0</strong> · Revenue: <strong id="revenue">₹0</strong></span>
  </div>

  <div class="main">
    <div class="stats-row">
      <div class="stat-card"><div class="stat-emoji">📋</div><div class="stat-val" id="s-pending">0</div><div class="stat-label">Pending</div></div>
      <div class="stat-card"><div class="stat-emoji">👨‍🍳</div><div class="stat-val" id="s-preparing">0</div><div class="stat-label">Preparing</div></div>
      <div class="stat-card"><div class="stat-emoji">🛵</div><div class="stat-val" id="s-out">0</div><div class="stat-label">Out for Delivery</div></div>
      <div class="stat-card"><div class="stat-emoji">✅</div><div class="stat-val" id="s-done">0</div><div class="stat-label">Delivered Today</div></div>
    </div>

    <div class="orders-grid">
      <div class="panel">
        <div class="panel-title">🔔 Incoming Orders <span class="new-badge" id="new-count">0 NEW</span></div>
        <div id="orders-list"><div class="no-orders">No new orders yet.<br/>Waiting for orders...</div></div>
      </div>
      <div class="panel">
        <div class="panel-title">📡 Real-Time Event Log</div>
        <div id="event-log" style="max-height:500px;overflow-y:auto;"></div>
      </div>
    </div>
  </div>

  <script>
    let socket = null;
    let orders = {};
    let stats = { pending: 0, preparing: 0, out: 0, done: 0, revenue: 0, total: 0 };

    function reconnect() {
      if (socket) socket.disconnect();
      const url = document.getElementById('server-url').value.trim();
      socket = io(url, { transports: ['websocket', 'polling'] });
      bindEvents();
    }

    function bindEvents() {
      socket.on('connect', () => {
        document.getElementById('socket-dot').style.background = '#22c55e';
        document.getElementById('socket-status').textContent = 'LIVE · ' + socket.id.slice(0, 8);
        socket.emit('join_restaurant', { restaurantId: 'r1' });
        log('🟢 Connected to F&G Server', 'connect');
      });

      socket.on('disconnect', () => {
        document.getElementById('socket-dot').style.background = '#ef4444';
        document.getElementById('socket-status').textContent = 'Disconnected';
        log('🔴 Disconnected from server');
      });

      socket.on('new_order', (order) => {
        orders[order.orderId] = { ...order, receivedAt: Date.now(), timerPct: 100 };
        stats.pending++;
        log(`📋 New Order #${order.orderId} · ₹${order.total ?? '—'}`);
        renderOrders();
        updateStats();
        // Play notification sound (if audio context available)
        try { new Audio('data:audio/wav;base64,UklGRjIAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhDgAAAAAAAAEA').play().catch(()=>{}); } catch(e) {}
      });

      socket.on('order_update', ({ orderId, status }) => {
        if (orders[orderId]) {
          orders[orderId].status = status;
          log(`📍 Order #${orderId} → ${status.toUpperCase()}`);
          renderOrders();
        }
      });
    }

    function acceptOrder(orderId) {
      socket.emit('accept_order', { orderId, restaurantId: 'r1' });
      orders[orderId].status = 'accepted';
      stats.pending = Math.max(0, stats.pending - 1);
      stats.preparing++;
      log(`✅ Accepted Order #${orderId}`);
      renderOrders(); updateStats();
    }

    function rejectOrder(orderId) {
      if (!confirm('Reject order #' + orderId + '?')) return;
      socket.emit('reject_order', { orderId, reason: 'Restaurant busy' });
      orders[orderId].status = 'rejected';
      stats.pending = Math.max(0, stats.pending - 1);
      log(`❌ Rejected Order #${orderId}`);
      renderOrders(); updateStats();
    }

    function renderOrders() {
      const list = document.getElementById('orders-list');
      const active = Object.values(orders).filter(o => !['delivered','rejected','cancelled'].includes(o.status));
      document.getElementById('new-count').textContent = stats.pending + ' NEW';
      if (active.length === 0) { list.innerHTML = '<div class="no-orders">No active orders.</div>'; return; }
      list.innerHTML = active.map(o => `
        <div class="order-card ${o.status === 'placed' ? 'new' : ''}">
          <div class="order-header">
            <span class="order-id">#${o.orderId}</span>
            <span class="order-time">${new Date(o.createdAt || Date.now()).toLocaleTimeString()}</span>
          </div>
          <div class="order-items">${o.items?.map?.(i => i.name)?.join(', ') || 'Grocery / Food items'}</div>
          <div class="order-footer">
            <span class="order-total">₹${o.total ?? '—'}</span>
            <div class="btn-row">
              ${o.status === 'placed' ? `
                <button class="btn btn-accept" onclick="acceptOrder('${o.orderId}')">✅ Accept</button>
                <button class="btn btn-reject" onclick="rejectOrder('${o.orderId}')">Reject</button>
              ` : `<span class="status-chip chip-preparing">● ${o.status.toUpperCase()}</span>`}
            </div>
          </div>
          ${o.status === 'placed' ? `
            <div class="timer-bar"><div class="timer-fill" id="timer-${o.orderId}" style="width:100%"></div></div>
          ` : ''}
        </div>
      `).join('');
    }

    function updateStats() {
      document.getElementById('s-pending').textContent = stats.pending;
      document.getElementById('s-preparing').textContent = stats.preparing;
      document.getElementById('s-out').textContent = stats.out;
      document.getElementById('s-done').textContent = stats.done;
    }

    function log(msg) {
      const el = document.getElementById('event-log');
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      entry.innerHTML = `<div class="log-time">${new Date().toLocaleTimeString()}</div><div class="log-msg">${msg}</div>`;
      el.prepend(entry);
      if (el.children.length > 50) el.removeChild(el.lastChild);
    }

    // Auto-connect on load
    window.onload = reconnect;
  </script>
</body>
</html>
